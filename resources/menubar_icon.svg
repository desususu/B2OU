<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <!-- macOS menu bar template icon — monochrome black with transparency -->
  <!-- System auto-inverts for dark mode when used as template image -->

  <!-- Shield outline -->
  <path d="
    M 22 2
    C 17 2, 14 4, 12.5 5.5
    C 11 4, 9.5 3.5, 8.5 3.5
    C 6.5 3.5, 5 5, 5 6.8
    C 5 9, 6.2 10.2, 8 10.2
    C 8.8 10.2, 9.5 9.8, 10.2 9.2
    C 9.8 12, 8.5 14.5, 7 14.8
    C 5 15.2, 5 17, 6.2 18
    C 6.2 18, 6 19, 6 20
    C 6 27, 13 32.5, 22 34
    C 31 32.5, 38 27, 38 20
    C 38 19, 37.8 18, 37.8 18
    C 39 17, 39 15.2, 37 14.8
    C 35.5 14.5, 34.2 12, 33.8 9.2
    C 34.5 9.8, 35.2 10.2, 36 10.2
    C 37.8 10.2, 39 9, 39 6.8
    C 39 5, 37.5 3.5, 35.5 3.5
    C 34.5 3.5, 33 4, 31.5 5.5
    C 30 4, 27 2, 22 2
    Z"
    fill="#000000" fill-rule="evenodd" />

  <!-- Bear head cutout (white/transparent) -->
  <!-- Left ear inner -->
  <circle cx="15.5" cy="7.5" r="3.2" fill="#FFFFFF"/>
  <!-- Right ear inner -->
  <circle cx="28.5" cy="7.5" r="3.2" fill="#FFFFFF"/>
  <!-- Head -->
  <ellipse cx="22" cy="12" rx="8.5" ry="7.5" fill="#FFFFFF"/>

  <!-- Eyes (dark, on white head) -->
  <circle cx="19" cy="11" r="1.5" fill="#000000"/>
  <circle cx="25" cy="11" r="1.5" fill="#000000"/>

  <!-- Nose -->
  <ellipse cx="22" cy="13.5" rx="1.5" ry="1.1" fill="#000000"/>

  <!-- Mouth -->
  <path d="M 20.8 14.5 Q 22 16 23.2 14.5"
        stroke="#000000" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- Sync arrows (on shield body) -->
  <g transform="translate(22, 24.5)">
    <path d="M -1 -3.5 A 3.5 3.5 0 0 1 3.5 -0.5"
          stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <polygon points="3.5,0.8 3.5,-2.2 5.2,-0.5" fill="#FFFFFF"/>

    <path d="M 1 3.5 A 3.5 3.5 0 0 1 -3.5 0.5"
          stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <polygon points="-3.5,-0.8 -3.5,2.2 -5.2,0.5" fill="#FFFFFF"/>
  </g>
</svg>
